kind = "web"
previewPath = "/temple-event/"
title = "新店雲陽寺｜五月點燈感恩茶禪會"
version = "1.0.0"
id = "artifacts/temple-event"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/temple-event/" ]
localPort = 24631

[services.development]
run = "pnpm --filter @workspace/temple-event run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/temple-event", "run", "build" ]
publicDir = "artifacts/temple-event/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24631"
BASE_PATH = "/temple-event/"
